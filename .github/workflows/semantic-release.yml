name: Semantic release

on:
  push:
    branches:
      - "master"

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8]
        go-version: [1.22]
    steps:
      - name: Cancel previous builds
        uses: rokroskar/workflow-run-cleanup-action@c631227427d0452af4994af0940d7655ebc50c7c # master
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false # The auth token is persisted in the local git config. semantic-release picks this one instead of GH_TOKEN
      - name: Configure SSH commit signing
        env:
          SIGNING_KEY: ${{ secrets.SEMANTIC_RELEASE_SIGNING_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SIGNING_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          git config --global gpg.format ssh
          git config --global user.signingkey ~/.ssh/signing_key
          git config --global commit.gpgSign true
          git config --global tag.gpgSign true
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.SEMANTIC_RELEASE_APP_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_PK }}
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run python-semantic-release
        run: |
          pip install python-semantic-release
          semantic-release version --print > VERSION
          git add VERSION
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install swag v2
        run: go install github.com/swaggo/swag/v2/cmd/swag@latest
      - name: Genrate vmaas-go docs
        run: |
          bash scripts/generate_vmaas_go_docs.sh
          git add vmaas-go/docs/openapi.json
      - name: Submit changes
        run: semantic-release version
        env:
          GH_TOKEN: "${{ steps.app-token.outputs.token }}"
